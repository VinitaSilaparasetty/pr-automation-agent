name: ingest-assets-ci

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "examples/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/copilot-instructions.md"

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Install dev dependencies
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  dagster-integration:
    name: Dagster asset integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Install package + dagster extras
        run: uv pip install -e ".[dagster]"

      - name: List all assets
        run: dagster asset list -m examples.dagster.defs
        env:
          PYTHONWARNINGS: "ignore::UserWarning"

      - name: Materialize REST example
        run: dagster asset materialize --select fetch_jsonplaceholder_posts -m examples.dagster.defs
        env:
          PYTHONWARNINGS: "ignore::UserWarning"

      - name: Materialize GraphQL example
        run: dagster asset materialize --select fetch_countries_countries -m examples.dagster.defs
        env:
          PYTHONWARNINGS: "ignore::UserWarning"

      - name: Upload example outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: example-outputs-${{ github.run_id }}
          path: tmp/
          retention-days: 7

  scaffold-cli:
    name: pr-agent CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Install package
        run: uv pip install -e .

      - name: Scaffold a REST asset (dry-run)
        run: pr-agent scaffold rest --provider acme --entity invoices --dry-run

      - name: Scaffold a GraphQL asset (dry-run)
        run: pr-agent scaffold graphql --provider acme --entity products --dry-run

      - name: Scaffold a DB asset (dry-run)
        run: pr-agent scaffold db --engine postgres --table orders --dry-run
