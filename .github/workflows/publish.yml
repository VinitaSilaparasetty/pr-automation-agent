name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Create virtual environment
        run: uv venv

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
