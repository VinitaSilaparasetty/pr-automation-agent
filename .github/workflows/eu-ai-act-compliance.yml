name: eu-ai-act-compliance

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  disclosure-check:
    name: EU AI Act Art. 50 — disclosure check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect AI authorship signals
        id: detect
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          IS_BOT=false
          HAS_LABEL=false
          HAS_DISCLOSURE=false

          # Flag Copilot bot author
          if echo "$PR_AUTHOR" | grep -qiE "copilot|bot\[bot\]"; then
            IS_BOT=true
          fi

          # Flag ai-generated label
          if echo "$LABELS" | grep -qi "ai-generated"; then
            HAS_LABEL=true
          fi

          # Check PR body has disclosure ticked
          if echo "$PR_BODY" | grep -qE '\[x\].*Yes.*AI'; then
            HAS_DISCLOSURE=true
          fi

          echo "is_bot=$IS_BOT"         >> "$GITHUB_OUTPUT"
          echo "has_label=$HAS_LABEL"   >> "$GITHUB_OUTPUT"
          echo "has_disclosure=$HAS_DISCLOSURE" >> "$GITHUB_OUTPUT"

      - name: Check Art. 52 header in changed Python files
        id: header_check
        run: |
          MISSING=""
          while IFS= read -r file; do
            if [[ "$file" == *.py ]] && ! grep -q "EU AI Act Art. 52" "$file" 2>/dev/null; then
              MISSING="$MISSING $file"
            fi
          done < <(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          if [[ -n "$MISSING" ]]; then
            echo "missing_header=true" >> "$GITHUB_OUTPUT"
            echo "missing_files=$MISSING" >> "$GITHUB_OUTPUT"
          else
            echo "missing_header=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply ai-generated label (bot PRs)
        if: steps.detect.outputs.is_bot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["ai-generated"]
            });

      - name: Fail if AI signals present but disclosure missing
        if: |
          (steps.detect.outputs.is_bot == 'true' || steps.detect.outputs.has_label == 'true')
          && steps.detect.outputs.has_disclosure == 'false'
        run: |
          echo "::error::EU AI Act Art. 50 compliance failure."
          echo "::error::This PR appears to be AI-generated but the disclosure checkbox is not ticked."
          echo "::error::Edit the PR description and tick: [x] Yes — AI-assisted"
          exit 1

      - name: Warn if Art. 52 headers missing
        if: steps.header_check.outputs.missing_header == 'true'
        run: |
          echo "::warning::EU AI Act Art. 52: the following new/modified Python files are missing the AI-generated header:"
          echo "${{ steps.header_check.outputs.missing_files }}"
          echo "Add this comment block at the top of each file:"
          echo "  # EU AI Act Art. 52 — AI-Generated Content"
          echo "  # Generated by: GitHub Copilot   Date: $(date -I)"
          echo "  # Human reviewer required before merging"
