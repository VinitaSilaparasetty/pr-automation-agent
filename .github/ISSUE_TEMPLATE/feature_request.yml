name: "Feature request"
description: "Suggest a new feature or improvement."
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "e.g. There is no way to scaffold a streaming ingest file..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scaffold CLI
        - Base classes (REST / GraphQL / DB)
        - Dagster integration
        - Secret resolver
        - EU AI Act compliance
        - CI / workflows
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any workarounds you are currently using?
